<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><meta name="referrer" content="no-referrer">
<title>Scope Tracker — Sign in</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--navy:#1F3A5F;--steel:#2E5A88;--gold:#C8A24B;--ink:#1c2530;--mut:#6b7886;--line:#e3e8ef;--bg:#f5f7fa;--card:#fff;--orange:#b9650a;--red:#b3322e;--green:#2e7d32}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
header{background:linear-gradient(100deg,var(--navy),var(--steel));color:#fff;padding:18px 26px}
header h1{margin:0;font-size:21px}header .sub{opacity:.9;font-size:13px;margin-top:3px}
.badges{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);padding:5px 11px;border-radius:20px;font-size:12px;white-space:nowrap}
.badge b{color:var(--gold)}
#banner{display:none;background:#fff4e5;color:#8a4b00;border-bottom:1px solid #f0d9b5;padding:7px 14px;font-size:12.5px;text-align:center}
nav{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 18px;overflow-x:auto}
nav button{background:none;border:none;padding:13px 16px;font-size:13.5px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav button.active{color:var(--navy);border-bottom-color:var(--gold)}
main{max-width:1240px;margin:0 auto;padding:22px}
.view{display:none}.view.active{display:block}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:15px 16px}
.kpi .n{font-size:27px;font-weight:700;color:var(--navy)}.kpi .l{font-size:12px;color:var(--mut);margin-top:2px}
.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}@media(max-width:880px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:18px}
.panel h3{margin:0 0 12px;font-size:15px;color:var(--navy)}
.callout{border-left:3px solid var(--gold);background:#fbf7ee;padding:9px 12px;border-radius:0 6px 6px 0;margin:8px 0;font-size:13px}
.callout.red{border-color:var(--red);background:#fdf1f0}.callout.orange{border-color:var(--orange);background:#fdf6ee}
.tl{position:relative;margin:6px 0 0;padding-left:20px}.tl:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl .ev{position:relative;padding:0 0 16px 14px}.tl .ev:before{content:"";position:absolute;left:-19px;top:3px;width:11px;height:11px;border-radius:50%;background:var(--steel);border:2px solid #fff;box-shadow:0 0 0 1px var(--steel)}
.tl .ev.major:before{background:var(--red);box-shadow:0 0 0 1px var(--red)}.tl .d{font-weight:700;color:var(--navy);font-size:13px}.tl .t{font-size:12.5px;color:var(--mut)}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.controls input,.controls select{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit}
.controls input{flex:1;min-width:200px}
.btnlite{border:1px solid var(--line);background:#fff;border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600;color:var(--navy);cursor:pointer}.btnlite:hover{background:#f0f4f9}
.who{font-size:12px;color:var(--mut);font-weight:600;margin-left:auto}.who b{color:var(--navy)}.who a{color:var(--steel);cursor:pointer;text-decoration:underline;margin-left:6px}
.progress{display:flex;align-items:center;gap:10px;margin:2px 0 12px}
.bar{flex:1;height:10px;background:#e6ebf2;border-radius:6px;overflow:hidden}.bar>i{display:block;height:100%;background:linear-gradient(90deg,#3fa06a,#2e7d32);width:0;transition:width .25s}
.pct{font-size:12px;color:var(--mut);font-weight:700;white-space:nowrap}
.submenu{position:sticky;top:46px;z-index:15;background:var(--bg);padding:9px 0;display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:12px}
.tchip{border:1px solid var(--line);background:#fff;border-radius:18px;padding:6px 11px;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;align-items:center;gap:7px}.tchip:hover{border-color:var(--steel)}
.tchip .sw{width:9px;height:9px;border-radius:3px;flex:none}.tchip .pc{font-size:10.5px;color:var(--mut);font-weight:700}
details.trade{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden;scroll-margin-top:100px}
details.trade>summary{list-style:none;cursor:pointer;padding:13px 16px;display:flex;align-items:center;gap:11px;font-weight:700;color:var(--navy)}
details.trade>summary::-webkit-details-marker{display:none}
.dot{width:11px;height:11px;border-radius:3px;flex:none}summary .cnt{margin-left:auto;font-size:12px;color:var(--mut);font-weight:600}
.sec{padding:0 16px 8px}.sec h4{margin:14px 0 6px;font-size:13px;color:var(--steel);border-bottom:1px solid var(--line);padding-bottom:4px}
.note{font-size:12px;color:var(--mut);font-style:italic;margin:4px 0}
table{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0 10px}
th{background:#eef2f7;color:var(--navy);text-align:left;padding:7px 9px;font-size:11.5px}
td{padding:6px 9px;border-bottom:1px solid var(--line);vertical-align:top}
tr:nth-child(even) td{background:#fafbfd}
td.cbx,th.cbx{width:34px;text-align:center}td.num,th.num{width:86px;font-weight:700;color:var(--steel);font-size:11px}
input.chk{width:16px;height:16px;cursor:pointer;accent-color:#2e7d32;margin:0}
tr.done td:not(.cbx):not(.num){text-decoration:line-through;color:#a4afba}tr.done td.num{color:#2e7d32}tr.done td{background:#f4f8f4 !important}
.cap{display:block;font-weight:600;color:#2e7d32;font-size:9px;margin-top:2px;line-height:1.2;text-decoration:none}
.tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 6px;border-radius:4px;background:#eef2f7;color:var(--steel)}
.idxtbl td.c{text-align:center;font-weight:700}.yes{color:var(--green)}.no{color:#c7ced8}
.tag.tclk{cursor:pointer;background:#e7f0fb;color:#1c4f86;border:1px solid #bcd6f2}.tag.tclk:hover{background:#1c4f86;color:#fff}
.reflink{color:#1c6fd6;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;font-weight:600}.reflink:hover{color:#fff;background:#1c6fd6;border-radius:3px;text-decoration:none}
.setbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:0 0 10px}.setbar b{font-size:12px;color:var(--mut);margin-right:2px}
.setchip{font-size:12px;padding:5px 11px;border:1px solid var(--line);background:#fff;border-radius:16px;cursor:pointer;font-weight:600;color:var(--ink)}.setchip:hover{border-color:#1c4f86}.setchip.on{background:#1c4f86;color:#fff;border-color:#1c4f86}
.flg-o{color:var(--orange);font-weight:600}.flg-r{color:var(--red);font-weight:600}
mark{background:#fff1a8;padding:0 1px}.hidden{display:none!important}
.lg{padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px}
.lt{color:var(--mut);font-size:11.5px;font-variant-numeric:tabular-nums;margin-right:8px}
.lg .ico{font-weight:800;margin-right:5px}.lg.checked .ico{color:var(--green)}.lg.unchecked .ico{color:var(--red)}.lg.clear .ico{color:var(--orange)}
.foot{color:var(--mut);font-size:11.5px;text-align:center;padding:18px}
#app{display:none}
#gate{position:fixed;inset:0;background:linear-gradient(120deg,#1F3A5F,#2E5A88);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
#gate .box{background:#fff;border-radius:16px;padding:28px;width:380px;max-width:100%;box-shadow:0 24px 70px rgba(0,0,0,.4)}
#gate .lock{width:46px;height:46px;border-radius:12px;background:#eef2f7;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:22px}
#gate h2{margin:0 0 4px;font-size:19px;color:var(--navy)}#gate p{margin:0 0 14px;font-size:12.5px;color:var(--mut)}
#gate label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin:12px 0 4px}
#gate input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit}
#gate button{margin-top:18px;width:100%;padding:12px;border:none;border-radius:9px;background:var(--steel);color:#fff;font-weight:700;font-size:14px;cursor:pointer}
#gate button:disabled{opacity:.6;cursor:default}
#gate .err{color:var(--red);font-size:12px;margin-top:10px;display:none}

.backbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
.backbtn:hover{background:rgba(255,255,255,.25)}
#picker{display:none;max-width:1000px;margin:0 auto;padding:40px 22px}
.phead{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.phead h2{margin:0;color:var(--navy);font-size:22px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.pcard{text-align:left;background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:.15s;font-family:inherit}
.pcard:hover{border-color:var(--steel);box-shadow:0 10px 26px -12px rgba(13,40,80,.25);transform:translateY(-2px)}
.pcard .pn{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px}
.pcard .pa{font-size:12.5px;color:var(--mut);margin-bottom:12px}
.pcard .pbar{height:8px;background:#e6ebf2;border-radius:5px;overflow:hidden;margin-bottom:6px}
.pcard .pbar>i{display:block;height:100%;background:linear-gradient(90deg,#3fa06a,#2e7d32)}
.pcard .ps{font-size:12px;color:var(--mut);font-weight:600}

.lgd{padding:12px 16px}.lgdh{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:9px}
.legendgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:7px 18px}
.legitem{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink)}
.legitem .sw{width:11px;height:11px;border-radius:3px;flex:none}
.legitem code{font-weight:800;color:var(--navy);font-family:inherit;min-width:24px}

.addrow{padding:4px 16px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btnlite.addtask,.btnlite.addtrade{font-size:12px;padding:6px 10px}
.addform{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 16px 6px;width:calc(100% - 32px)}
.addform input{padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit}
.addform .afd{flex:2;min-width:220px}.addform .afl,.addform .aff{flex:1;min-width:120px}
#addtradeform{margin:8px 0 4px;width:100%}
.mtag{display:inline-block;font-size:9px;font-weight:700;color:#7a5cab;background:#efe9f7;border-radius:4px;padding:1px 5px;vertical-align:middle}
.delx{background:none;border:none;color:#b3322e;cursor:pointer;font-size:13px;font-weight:700}
.delx.tradedel{font-size:11.5px;border:1px solid #f0d2d0;border-radius:6px;padding:4px 8px;margin-left:auto}
code.tc{font-size:11px;font-weight:800;color:var(--steel);margin-left:8px}
.byc{font-size:11.5px;color:var(--mut)}
/* priority */
td.prio,th.prio{width:46px;text-align:center}
.pchip{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--line);border-radius:14px;padding:2px 7px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;line-height:1.4;user-select:none}
.pchip .pem{font-size:12px}
.pchip.set{color:#fff;border-color:transparent}
.pchip.unset{color:var(--mut)}
.priopop{position:fixed;z-index:120;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 50px rgba(13,40,80,.28);padding:12px 10px 10px;width:96px;display:flex;flex-direction:column;align-items:center;gap:6px}
.priopop .pe{font-size:18px;line-height:1}
.priopop .pval{font-size:12px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
.vrange{-webkit-appearance:none;appearance:none;writing-mode:vertical-lr;direction:rtl;width:26px;height:150px;border-radius:13px;outline:none;cursor:pointer;background:linear-gradient(to top,#2a7db1,#7fb3d5 45%,#e8a36a 55%,#b3322e)}
.vrange::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:16px;border-radius:6px;background:#fff;border:2px solid var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer}
.vrange::-moz-range-thumb{width:24px;height:16px;border-radius:6px;background:#fff;border:2px solid var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer}
.priopop .pclr{border:none;background:none;color:var(--mut);font-size:11px;cursor:pointer;text-decoration:underline}
.priopop .pclr:hover{color:var(--red)}
/* to-do tab */
#todo .todorow{display:grid;grid-template-columns:64px 78px 1fr auto auto 30px;gap:10px;align-items:center;padding:9px 12px;border-bottom:1px solid var(--line)}
#todo .todorow:nth-child(even){background:#fafbfd}
#todo .todorow.done .tdesc,#todo .todorow.done .tid{text-decoration:line-through;color:#a4afba}
#todo .pbar2{height:8px;border-radius:5px;width:48px}
#todo .tid{font-weight:700;color:var(--steel);font-size:11px}
#todo .tdesc{font-size:12.5px}
#todo .ttrade{font-size:10.5px;font-weight:700;color:var(--navy);background:#eef2f7;border-radius:4px;padding:2px 6px;white-space:nowrap}
#todo .todohdr{display:grid;grid-template-columns:64px 78px 1fr auto auto 30px;gap:10px;padding:7px 12px;font-size:11px;font-weight:700;color:var(--navy);background:#eef2f7;border-radius:8px 8px 0 0}
#todo .tempty{color:var(--mut);font-style:italic;padding:18px 4px}
/* rename + undo */
.editx{background:none;border:none;color:var(--steel);cursor:pointer;font-size:13px;font-weight:700;margin-right:2px}
.editx.tradeedit{font-size:11.5px;border:1px solid #cfe0ef;border-radius:6px;padding:4px 8px;margin-left:8px;color:var(--steel)}
.editform{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0;width:100%}
.editform input{padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit}
.editform .efd{flex:2;min-width:200px}.editform .efl,.editform .eff{flex:1;min-width:110px}
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:300;background:var(--navy);color:#fff;border-radius:10px;padding:11px 14px;font-size:13px;box-shadow:0 14px 40px rgba(13,40,80,.35);display:none;align-items:center;gap:14px;max-width:92vw}
#toast .tmsg{font-weight:600}
#toast .tundo{background:var(--gold);border:none;color:#1c2530;font-weight:800;border-radius:7px;padding:6px 12px;font-size:12.5px;cursor:pointer}
#toast .tclose{background:none;border:none;color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;line-height:1;padding:0 2px}
@media(max-width:520px){#toast{left:10px;right:10px;transform:none}}
.sresult{padding:9px 11px;border-bottom:1px solid var(--line);cursor:pointer}.sresult:hover{background:#f0f4f9}.sresult.done .srdesc{text-decoration:line-through;color:#a4afba}.srtrade{font-size:11px;color:var(--mut);font-weight:600;margin-left:8px}.srdesc{font-size:13px;margin-top:3px}tr.flash td{animation:flashrow 1.6s ease}@keyframes flashrow{0%,100%{background:inherit}25%{background:#fff3a8}}
</style></head><body>
<div id="gate"><div class="box">
<div class="lock">🔒</div>
<h2>Project Scope Tracker</h2><p>Private project tracker. Enter your name and the team passcode to continue.</p>
<label>Your name</label><input id="gname" placeholder="e.g. Gary R." autocomplete="name">
<label>Team passcode</label><input id="gpass" type="password" placeholder="passcode" autocomplete="current-password">
<button id="gbtn">Sign in</button><div class="err" id="gerr"></div>
</div></div>
<div id="picker"></div>
<div id="app">
<header><div style="display:flex;align-items:center;gap:14px"><button id="backbtn" class="backbtn">← Projects</button><h1 id="htitle" style="margin:0"></h1><button id="bellbtn" class="bellbtn" title="Reminders — tasks due & notes for you" style="margin-left:auto">🔔<span id="bellbadge" class="bellbadge"></span></button></div><div class="sub" id="hsub"></div><div class="badges" id="hbadges"></div></header>
<div id="banner"></div>
<nav id="nav"></nav>
<main>
<section id="todo" class="view active"></section>
<section id="search" class="view"></section>
<section id="overview" class="view"></section>
<section id="scope" class="view"></section>
<section id="index" class="view"></section>
<section id="inspect" class="view"></section>
<section id="activity" class="view"></section>
<section id="bulletins" class="view"></section>
<section id="notes" class="view"></section>
<section id="team" class="view"></section>
<section id="schedule" class="view"></section>
</main>
<div class="foot">Confidential — internal use only. Check-offs &amp; activity log sync live across the team. Scope reflects the 09/17/25 Bid Set unless noted.</div>
</div>
<div id="toast"><span class="tmsg"></span><button class="tundo">Undo</button><button class="tclose" title="Dismiss">✕</button></div>
<script>
const API="/api/tatte";
const PREFIX=["AD","AF","MW","ME","EL","PL","FA","FS","ST"];
const SHORT=["Demo / Partitions","Finishes / Ceilings","Millwork","Mechanical","Electrical","Plumbing","Fire Prot. / Alarm","Foodservice","Structural / PA"];
const esc=s=>(s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmt=ts=>{const d=new Date(ts);return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
const first=s=>(s||'').split(' ')[0];
function flagClass(v){const u=(v||'').toUpperCase();
 if(/NIC|BY OTHER|BY OWNER|BY LANDLORD|BY TENANT|SEPARATE|N\.I\.C|OWNER-FURNISH|VENDOR/.test(u))return'flg-o';
 if(/ALLOW|ALTERNATE|\bADD\b|HOLD|VERIFY|CONFLICT|TBD/.test(u))return'flg-r';return'';}
let D=null, PASS='', USER='', STATE={}, LOG=[], pending=new Set(), TOTAL=0, INSTOTAL=0, pollT=null, JOBS=[], JOB=null, ADD={trades:[],tasks:[]}, PRIO={}, IDX={}, DRAW={}, SHEETS={}, NOTES={}, ROSTER=[];
// ---- priority helpers ----
// value 0-100: high=🔥 hot red (urgent), low=🐧 ice blue. Returns css color for a given value.
function prioColor(v){v=Math.max(0,Math.min(100,v||0));
 // blend ice-blue (#2a7db1) -> red (#b3322e) across 0..100
 const a=[42,125,177],b=[179,50,46];const t=v/100;
 const r=Math.round(a[0]+(b[0]-a[0])*t),g=Math.round(a[1]+(b[1]-a[1])*t),bl=Math.round(a[2]+(b[2]-a[2])*t);
 return 'rgb('+r+','+g+','+bl+')';}
function prioEmoji(v){return (v||0)>=50?'🔥':'🐧';}
function prioChipHTML(id){const v=PRIO[id];
 if(v==null) return '<span class="pchip unset" data-prio="'+esc(id)+'" title="Set importance">⚖ —</span>';
 return '<span class="pchip set" data-prio="'+esc(id)+'" style="background:'+prioColor(v)+'" title="Importance '+v+'">'+
   '<span class="pem">'+prioEmoji(v)+'</span>'+v+'</span>';}
function reflectPrioChip(id){document.querySelectorAll('.pchip[data-prio="'+CSS.escape(id)+'"]').forEach(function(c){
 var tmp=document.createElement('div');tmp.innerHTML=prioChipHTML(id);var nw=tmp.firstChild;c.replaceWith(nw);});}
const banner=m=>{const b=document.getElementById('banner');b.textContent=m;b.style.display=m?'block':'none';};
async function apiList(){const r=await fetch(API+'?list=1',{headers:{'x-pass':PASS}});if(r.status===401)throw 401;if(!r.ok)throw 'err';return r.json();}
async function apiGet(init){const r=await fetch(API+'?job='+encodeURIComponent(JOB)+(init?'&init=1':''),{headers:{'x-pass':PASS}});if(r.status===401)throw 401;if(!r.ok)throw 'err';return r.json();}
async function apiPost(body){body.job=JOB;const r=await fetch(API,{method:'POST',headers:{'content-type':'application/json','x-pass':PASS},body:JSON.stringify(body)});if(!r.ok)throw r.status;return r.json();}

// nav (static)
const TABS=[['todo','🔥 To-Do'],['search','🔎 Search'],['notes','📝 Notes'],['team','👷 Team'],['schedule','📅 Schedule'],['overview','Overview'],['scope','Scope by Trade'],['index','Drawing Index'],['inspect','Inspections'],['activity','Activity Log'],['bulletins','Bulletin Log']];
const nav=document.getElementById('nav');

function buildIndex(){IDX={};
 if(D&&D.trades){D.trades.forEach(function(t,ti){var code=tcode(t,ti);var n=0;
   (t.sections||[]).forEach(function(sec){(sec.tables||[]).forEach(function(tab){
     (tab.rows||[]).forEach(function(r){var ne=r.filter(function(x){return x.trim();});
       if(ne.length===1&&r.length>1)return; n++;var id=code+'-'+String(n).padStart(3,'0');
       IDX[id]={desc:(r[1]||r[0]||'').toString(),code:code};});});});});}
 (ADD.tasks||[]).forEach(function(t){IDX[t.id]={desc:t.desc||'',code:t.code};});}
const prioTimers={};const prioPending=new Set();

function setPrioValue(id,v){v=Math.max(0,Math.min(100,Math.round(v)));

 savePrio(id,v); reflectPrioChip(id); renderTodo();}

function reflectRow(id){const done=!!(STATE[id]&&STATE[id].done);
 document.querySelectorAll('.chk[data-id="'+(window.CSS&&CSS.escape?CSS.escape(id):id)+'"]').forEach(function(cb){
  cb.checked=done;const tr=cb.closest('tr');
  if(!tr){const tdrow=cb.closest('.todorow');if(tdrow)tdrow.classList.toggle('done',done);return;}
  tr.classList.toggle('done',done);const num=tr.querySelector('.num');if(!num)return;
  if(done){const s=STATE[id];num.innerHTML=`<span class="idl">${id}</span><span class="cap">✓ ${esc(first(s.by))} · ${s.at?fmt(s.at):''}</span>`;tr.title='Checked by '+(s.by||'')+(s.at?' on '+new Date(s.at).toLocaleString():'');}
  else{num.innerHTML=`<span class="idl">${id}</span>`;tr.removeAttribute('title');}});}
function reflectAll(){const seen={};document.querySelectorAll('.chk').forEach(function(cb){if(seen[cb.dataset.id])return;seen[cb.dataset.id]=1;reflectRow(cb.dataset.id);});updateCounts();injectDrawIcons();if(typeof linkifyRefs==='function')linkifyRefs();if(typeof injectNoteIcons==='function'){injectNoteIcons();renderNotesFeed();}if(typeof injectAssignIcons==='function')injectAssignIcons();if(typeof renderBell==='function')renderBell();}
function updateCounts(){var insp=0;Object.keys(STATE).forEach(function(k){if(STATE[k]&&STATE[k].done&&k.indexOf('INS-')===0)insp++;});
 var tot=0,tdone=0;allTrades().forEach(function(t){var total=t.count+manualCount(t.code);var dn=Object.keys(STATE).filter(function(k){return STATE[k]&&STATE[k].done&&k.split('-')[0]===t.code;}).length;tot+=total;tdone+=dn;var a=document.getElementById('cnt-'+t.code);if(a)a.textContent=dn+' / '+total;var b=document.getElementById('chip-'+t.code);if(b){b.textContent=dn+'/'+total;b.style.color=(dn===total&&total)?'var(--green)':'';}});
 TOTAL=tot;var pb=document.getElementById('pbar');if(pb)pb.style.width=(tot?100*tdone/tot:0)+'%';
 var pt=document.getElementById('ptxt');if(pt)pt.textContent=tdone+' / '+tot+' ('+(tot?Math.round(100*tdone/tot):0)+'%)';
 var od=document.getElementById('ovdone');if(od)od.textContent=tdone;
 var ib=document.getElementById('ibar');if(ib)ib.style.width=(INSTOTAL?100*insp/INSTOTAL:0)+'%';
 var it=document.getElementById('itxt');if(it)it.textContent=insp+' / '+INSTOTAL+' inspections signed off';}
function renderLog(){const box=document.getElementById('logbox');if(!box)return;const q=(document.getElementById('aq').value||'').toLowerCase();
 const rows=LOG.filter(e=>!q||((e.user||'')+' '+(e.id||'')+' '+(e.label||'')+' '+(e.action||'')).toLowerCase().includes(q));
 document.getElementById('acount').textContent=LOG.length+' entries';
 box.innerHTML=rows.slice(0,500).map(e=>{const cls=e.action==='checked'?'checked':e.action==='unchecked'?'unchecked':'clear';const ico=e.action==='checked'?'✓':e.action==='unchecked'?'✕':'⟳';

function applyFilter(){const q=document.getElementById('q').value.toLowerCase().trim(),ff=document.getElementById('ff').value;let shown=0;
 document.querySelectorAll('#trades tr').forEach(tr=>{if(tr.querySelector('th'))return;if(tr.classList.contains('srow')){tr.classList.remove('hidden');return;}
  const txt=tr.textContent.toLowerCase();let ok=(!q||txt.includes(q));
  if(ok&&ff==='open')ok=!tr.classList.contains('done');else if(ok&&ff==='done')ok=tr.classList.contains('done');else if(ok&&ff)ok=!!tr.querySelector('.'+ff);
  tr.classList.toggle('hidden',!ok);if(ok)shown++;
  if(q){tr.querySelectorAll('td:not(.cbx):not(.num)').forEach(td=>{const o=td.getAttribute('data-o')||td.innerHTML;td.setAttribute('data-o',o);td.innerHTML=o.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');});}else{tr.querySelectorAll('td[data-o]').forEach(td=>{td.innerHTML=td.getAttribute('data-o');td.removeAttribute('data-o');});}});

 if(res.prio){const np=res.prio;prioPending.forEach(function(id){if(PRIO[id]!=null)np[id]=PRIO[id];else delete np[id];});if(JSON.stringify(np)!==JSON.stringify(PRIO)){const touched=new Set(Object.keys(PRIO).concat(Object.keys(np)));PRIO=np;touched.forEach(reflectPrioChip);if(addChanged)buildIndex();renderTodo();addChanged=false;}}

(function(){var st=document.createElement('style');st.textContent='.bellbtn{position:relative;background:none;border:none;cursor:pointer;font-size:19px;line-height:1;padding:4px}.bellbadge{display:none;position:absolute;top:-2px;right:-3px;min-width:15px;height:15px;padding:0 3px;border-radius:8px;background:#7c8a99;color:#fff;font-size:9px;font-weight:700;line-height:15px;text-align:center;align-items:center;justify-content:center}.bellbadge.urgent{background:#e5322d}#bellpanel{display:none;position:fixed;top:54px;right:14px;width:330px;max-width:92vw;max-height:70vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 50px rgba(0,0,0,.25);z-index:340;padding:6px}.bellhd{font-size:13px;color:var(--mut);padding:8px 10px 4px}.bellsec{font-size:11px;font-weight:700;color:var(--navy,#1c4f86);text-transform:uppercase;letter-spacing:.03em;padding:8px 10px 3px}.bellrow{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;cursor:pointer}.bellrow:hover{background:#f0f4f9}.belltx{flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}';document.head.appendChild(st);var p=document.createElement('div');p.id='bellpanel';document.body.appendChild(p);})();
function todoAssignHTML(id){var a=(typeof ASSIGN!=='undefined')&&ASSIGN[id];if(!a)return '';var h=' <span class="tdasg">';(a.to||[]).slice(0,3).forEach(function(n){h+=avatarChip(n);});var db=dueBadge(a.due);if(db)h+='<span class="duechip '+db.cls+'">'+db.txt+'</span>';return h+'</span>';}
(function(){var st=document.createElement('style');st.textContent='.tdasg{display:inline-flex;align-items:center;gap:2px;margin-left:6px;vertical-align:middle}.schpersel{border:1px solid var(--line);border-radius:16px;padding:5px 9px;font:inherit;font-size:12px;font-weight:600;margin-left:auto}';document.head.appendChild(st);})();
